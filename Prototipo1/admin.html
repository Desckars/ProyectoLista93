<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin - Lista93</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="estiloadmin.css">
</head>
<body>

<!-- PANTALLA LOGIN -->
<div id="pantalla-login">
  <h1>🔒 Panel Admin</h1>
  <p>Acceso restringido al administrador</p>
  <input type="password" id="input-pass" class="campo" placeholder="Contraseña" onkeydown="if(event.key==='Enter')login()">
  <button class="btn" onclick="login()">Ingresar</button>
  <div class="error-msg" id="error-login">Contraseña incorrecta</div>
</div>

<!-- PANTALLA PANEL -->
<div id="pantalla-panel">
  <div class="panel-header">
    <h1>Panel de Publicaciones</h1>
    <button class="btn-salir" onclick="salir()">Cerrar sesión</button>
  </div>

  <div class="admin-grid">
    <div class="admin-card">
      <div class="admin-card-header">
        <h2>Crear nueva publicación</h2>
      </div>
      <div class="admin-card-body">
        <input type="text" id="input-titulo" class="campo-desc" placeholder="Título de la publicación">
        <textarea id="input-desc" class="campo-desc" rows="5" placeholder="Descripción"></textarea>
        <div class="admin-form-row">
          <input type="date" id="input-fecha" class="campo-desc" readonly>
        </div>

        <div class="upload-box" id="upload-box"
          ondragover="event.preventDefault();this.classList.add('drag-over')"
          ondragleave="this.classList.remove('drag-over')"
          ondrop="onDrop(event)">
          <div class="upload-icon">🖼️</div>
          <p><strong>Arrastrá una imagen acá</strong><br>o elegila desde tu dispositivo</p>
          <label class="btn-elegir" for="input-archivo">Elegir imagen</label>
          <input type="file" id="input-archivo" accept="image/*" onchange="onArchivoElegido(event)">
        </div>

        <div id="preview-container">
          <img id="preview-img" src="" alt="preview">
          <div id="preview-nombre"></div>
        </div>

        <div id="barra-container">
          <div id="barra-fondo"><div id="barra-progreso"></div></div>
          <div id="barra-texto">Subiendo...</div>
        </div>

        <div id="status-msg"></div>

        <button class="btn" id="btn-subir" onclick="guardarPublicacion()" disabled>Guardar publicación</button>
      </div>
    </div>

    <div class="admin-card admin-list-card">
      <div class="admin-card-header">
        <h2>Publicaciones vigentes</h2>
        <div class="admin-pagination" id="pagination-admin"></div>
      </div>
      <div id="publicaciones-admin" class="admin-list"></div>
    </div>
  </div>

  <div class="admin-card admin-calendar-card">
    <div class="admin-card-header">
      <h2>Calendario</h2>
    </div>
    <div class="calendar-card-body">
      <div class="galeria-titulo">📅 Link del Calendario</div>
      <div class="admin-form-row" style="margin-top: 10px;">
        <input
          type="url"
          id="input-calendario"
          class="campo-desc"
          placeholder="Ingrese link de Google Calendar"
        >
        <button class="btn" onclick="guardarCalendario()">Guardar</button>
      </div>
      <div id="status-calendario" class="admin-calendar-status"></div>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL    = 'https://lnqqmoflqbbgxstxlujy.supabase.co';
  const SUPABASE_KEY    = 'sb_publishable_ehNfp-wrQtIqlDbtNesRww_iFNWR-H3';
  const BUCKET          = 'imagenes';
  const PASSWORD        = 'admin93';
  const PAGE_SIZE       = 10;

  const headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json'
  };

  let archivoActual = null;
  let adminPage = 1;
  let hasNextPage = false;

  function getUruguayDate() {
    return new Date().toLocaleDateString('sv', { timeZone: 'America/Montevideo' });
  }

  function login() {
    const pass = document.getElementById('input-pass').value;
    if (pass === PASSWORD) {
      document.getElementById('pantalla-login').style.display = 'none';
      document.getElementById('pantalla-panel').style.display = 'block';
      document.getElementById('input-fecha').value = getUruguayDate();
      cargarPublicaciones();
      cargarCalendario();
    } else {
      document.getElementById('error-login').style.display = 'block';
    }
  }

  function salir() {
    document.getElementById('pantalla-panel').style.display = 'none';
    document.getElementById('pantalla-login').style.display = 'block';
    document.getElementById('input-pass').value = '';
  }

  function onArchivoElegido(e) {
    const file = e.target.files[0];
    if (file) mostrarPreview(file);
  }

  function onDrop(e) {
    e.preventDefault();
    document.getElementById('upload-box').classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) mostrarPreview(file);
  }

  function mostrarPreview(file) {
    archivoActual = file;
    const reader = new FileReader();
    reader.onload = (e) => {
      document.getElementById('preview-img').src = e.target.result;
      document.getElementById('preview-nombre').textContent = file.name;
      document.getElementById('preview-container').style.display = 'block';
      document.getElementById('btn-subir').disabled = false;
    };
    reader.readAsDataURL(file);
  }

  function mostrarStatus(msg, tipo) {
    const el = document.getElementById('status-msg');
    el.textContent = msg;
    el.className = tipo;
    el.style.display = msg ? 'block' : 'none';
  }

  function limpiarForm() {
    archivoActual = null;
    document.getElementById('input-archivo').value = '';
    document.getElementById('input-titulo').value = '';
    document.getElementById('input-desc').value = '';
    document.getElementById('preview-container').style.display = 'none';
    document.getElementById('btn-subir').disabled = true;
    document.getElementById('input-fecha').value = getUruguayDate();
  }

  async function subirArchivo() {
    const file = archivoActual;
    if (!file) return null;

    const ext = file.name.split('.').pop();
    const nombre = Date.now() + '.' + ext;

    document.getElementById('barra-container').style.display = 'block';
    document.getElementById('barra-progreso').style.width = '30%';
    document.getElementById('barra-texto').textContent = 'Subiendo imagen...';

    const res = await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${nombre}`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': file.type,
        'x-upsert': 'true'
      },
      body: file
    });

    if (!res.ok) throw new Error('Error al subir la imagen');

    document.getElementById('barra-progreso').style.width = '70%';
    document.getElementById('barra-texto').textContent = 'Generando URL...';

    return `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${nombre}`;
  }

  async function guardarPublicacion() {
    const titulo = document.getElementById('input-titulo').value.trim();
    const descripcion = document.getElementById('input-desc').value.trim();
    const fecha = getUruguayDate();
    const idfoto = 'IMG-' + Date.now();
    let urlFoto = null;

    if (!titulo) {
      mostrarStatus('⚠️ Ingresá un título', 'error');
      return;
    }

    try {
      if (archivoActual) {
        urlFoto = await subirArchivo();
      } else {
        mostrarStatus('⚠️ Seleccioná una imagen para la publicación', 'error');
        return;
      }

      if (!urlFoto) {
        mostrarStatus('⚠️ No se pudo generar la URL de la imagen', 'error');
        return;
      }

      const res = await fetch(`${SUPABASE_URL}/rest/v1/publicacion`, {
        method: 'POST',
        headers: { ...headers, 'Prefer': 'return=minimal' },
        body: JSON.stringify({
          titulo,
          IDfoto: idfoto,
          descripcion: descripcion || null,
          fecha,
          UrlFoto: urlFoto
        })
      });

      if (!res.ok) throw new Error('Error al guardar la publicación');

      mostrarStatus('✅ Publicación guardada correctamente', 'ok');
      limpiarForm();
      cargarPublicaciones(adminPage);
    } catch (err) {
      document.getElementById('barra-container').style.display = 'none';
      mostrarStatus('❌ ' + err.message, 'error');
    } finally {
      setTimeout(() => {
        document.getElementById('barra-container').style.display = 'none';
        document.getElementById('barra-progreso').style.width = '0%';
      }, 800);
    }
  }

  function formatDate(value) {
    if (!value) return '';
    return new Date(value).toLocaleDateString('es-UY', {
      day: '2-digit', month: '2-digit', year: 'numeric', timeZone: 'America/Montevideo'
    });
  }

  function escapeHtml(text) {
    return text
      ? text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;')
      : '';
  }

  function toggleDescripcion(id) {
    const descEl = document.getElementById('admin-desc-' + id);
    const btn = document.getElementById('admin-toggle-' + id);
    if (!descEl || !btn) return;

    const full = descEl.dataset.full || '';
    const expanded = descEl.dataset.expanded === 'true';

    if (expanded) {
      descEl.textContent = full.slice(0, 100) + (full.length > 100 ? '...' : '');
      descEl.dataset.expanded = 'false';
      btn.textContent = 'Ver más';
    } else {
      descEl.textContent = full;
      descEl.dataset.expanded = 'true';
      btn.textContent = 'Mostrar menos';
    }
  }

  function renderPagination(page, next) {
    const wrapper = document.getElementById('pagination-admin');
    wrapper.innerHTML = `
      <button class="pagination-button" onclick="cargarPublicaciones(${page - 1})" ${page === 1 ? 'disabled' : ''}>Anterior</button>
      <span>Página ${page}</span>
      <button class="pagination-button" onclick="cargarPublicaciones(${page + 1})" ${!next ? 'disabled' : ''}>Siguiente</button>
    `;
  }

  async function cargarPublicaciones(page = 1) {
    adminPage = page;
    const hoy = getUruguayDate();
    const offset = (page - 1) * PAGE_SIZE;
    const grid = document.getElementById('publicaciones-admin');
    grid.innerHTML = '<div class="galeria-vacia">Cargando publicaciones...</div>';

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/publicacion?select=*&fecha=lte.${hoy}&order=fecha.desc,id.desc&limit=${PAGE_SIZE + 1}&offset=${offset}`, { headers });
      const publicaciones = await res.json();
      hasNextPage = publicaciones.length > PAGE_SIZE;
      if (hasNextPage) publicaciones.pop();

      if (!publicaciones.length) {
        grid.innerHTML = '<div class="galeria-vacia">No hay publicaciones disponibles</div>';
      } else {
        grid.innerHTML = publicaciones.map(p => `
          <div class="admin-item" id="item-${p.id}">
            <div class="admin-item-media">
              <img src="${p.UrlFoto || 'Imagenes/logo_fondo.png'}" alt="${escapeHtml(p.titulo || 'Publicación')}">
            </div>
            <div class="admin-item-main">
              <div class="admin-item-header">
                <div>
                  <div class="admin-item-title">${escapeHtml(p.titulo)}</div>
                  <div class="admin-item-meta">${formatDate(p.fecha)} · ID: ${escapeHtml(p.IDfoto || '-')}</div>
                </div>
                <button class="btn-borrar" onclick="borrarPublicacion(${p.id}, '${p.UrlFoto || ''}')" title="Borrar">✕</button>
              </div>
              <div class="admin-item-desc" id="admin-desc-${p.id}" data-full="${escapeHtml(p.descripcion || '')}" data-expanded="false">
                ${escapeHtml((p.descripcion || '').slice(0, 100))}${(p.descripcion || '').length > 100 ? '...' : ''}
              </div>
              ${p.descripcion && p.descripcion.length > 100 ? `<button class="toggle-btn" id="admin-toggle-${p.id}" onclick="toggleDescripcion(${p.id})">Ver más</button>` : ''}
            </div>
          </div>
        `).join('');
      }
    } catch (e) {
      grid.innerHTML = '<div class="galeria-vacia">Error al cargar publicaciones</div>';
    }

    renderPagination(page, hasNextPage);
  }

  async function borrarPublicacion(id, url) {
    if (!confirm('¿Borrar esta publicación?')) return;

    try {
      if (url) {
        const nombre = url.split('/').pop().split('?')[0];
        if (nombre) {
          await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${nombre}`, {
            method: 'DELETE',
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
          });
        }
      }

      await fetch(`${SUPABASE_URL}/rest/v1/publicacion?id=eq.${id}`, {
        method: 'DELETE',
        headers
      });

      document.getElementById('item-' + id)?.remove();
      mostrarStatus('🗑️ Publicación borrada', 'ok');
      cargarPublicaciones(adminPage);
    } catch (e) {
      mostrarStatus('❌ Error al borrar', 'error');
    }
  }

  async function cargarCalendario() {
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/calendario?id=eq.1&select=link`, { headers });
      const data = await res.json();
      if (data.length && data[0].link) {
        document.getElementById('input-calendario').value = data[0].link;
      }
    } catch (e) {
      console.error('Error cargando calendario:', e);
    }
  }

  async function guardarCalendario() {
    const link = document.getElementById('input-calendario').value.trim();
    if (!link || !/^(https:\/\/calendar\.google\.com|https:\/\/www\.google\.com\/calendar)/.test(link)) {
      mostrarStatusCal('⚠️ Pegá un link válido de Google Calendar que comience con https://calendar.google.com o https://www.google.com/calendar', 'error');
      return;
    }

    try {
      const payload = { link };

      const res = await fetch(`${SUPABASE_URL}/rest/v1/calendario?id=eq.1`, {
        method: 'PATCH',
        headers: { ...headers, 'Prefer': 'return=minimal' },
        body: JSON.stringify(payload)
      });

      if (!res.ok) {
        const errorText = await res.text();
        throw new Error(`Error al guardar: ${res.status} ${errorText}`);
      }

      mostrarStatusCal('✅ Link guardado correctamente', 'ok');
    } catch (e) {
      console.error('Error guardando calendario:', e);
      mostrarStatusCal('❌ Error al guardar el link', 'error');
    }
  }

  function mostrarStatusCal(msg, tipo) {
    const el = document.getElementById('status-calendario');
    el.textContent = msg;
    el.style.display = 'block';
    el.style.background = tipo === 'ok' ? '#1a3a2a' : '#3a1a1a';
    el.style.color = tipo === 'ok' ? '#4ade80' : '#ff6b6b';
    setTimeout(() => el.style.display = 'none', 3000);
  }
</script>
</body>
</html>
