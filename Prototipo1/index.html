<script>
  // ── SUPABASE CONFIG ──────────────────────────
  const SUPABASE_URL = 'https://lnqqmoflqbbgxstxlujy.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_ehNfp-wrQtIqlDbtNesRww_iFNWR-H3';

  // ── CARRUSEL ─────────────────────────────────
  const track  = document.getElementById('track');
  const dotsEl = document.getElementById('dots');
  let actual = 0;
  let total  = 1;
  let intervalo;

  function crearDot(i) {
    const d = document.createElement('button');
    d.className = 'carousel-dot' + (i === 0 ? ' active' : '');
    d.setAttribute('aria-label', 'Ir a slide ' + (i + 1));
    d.addEventListener('click', () => ir(i));
    dotsEl.appendChild(d);
  }

  function actualizar() {
    track.style.transform = 'translateX(-' + (actual * 100) + '%)';
    document.querySelectorAll('.carousel-dot').forEach((d, i) => {
      d.classList.toggle('active', i === actual);
    });
  }

  function mover(dir) {
    actual = (actual + dir + total) % total;
    actualizar();
  }

  function ir(idx) {
    actual = idx;
    actualizar();
  }

  function iniciarAutoplay() {
    clearInterval(intervalo);
    intervalo = setInterval(() => mover(1), 4000);
  }

  // ── CARGAR FOTOS DESDE SUPABASE ───────────────
  async function cargarFotos() {
    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/fotos?select=*&order=created_at.desc`,
        { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } }
      );
      const fotos = await res.json();

      if (!fotos.length) {
        // Sin fotos: mostrar placeholder
        track.innerHTML = `
          <div class="carousel-slide slide-1">
            <span class="slide-label">Sin fotos aún</span>
          </div>`;
        total = 1;
        dotsEl.innerHTML = '';
        crearDot(0);
        return;
      }

      // Construir slides
      track.innerHTML = fotos.map(f => `
        <div class="carousel-slide">
          <img src="${f.url}" alt="${f.descripcion || 'foto'}">
        </div>
      `).join('');

      total = fotos.length;
      actual = 0;
      dotsEl.innerHTML = '';
      fotos.forEach((_, i) => crearDot(i));
      actualizar();
      iniciarAutoplay();

    } catch(e) {
      console.error('Error cargando fotos:', e);
    }
  }

  cargarFotos();

  // ==================== SPLASH SCREEN LOGIC ====================
const splash = document.getElementById('splash');

function showSplash() {
  // Si ya se mostró en esta sesión, saltar
  if (sessionStorage.getItem('splashShown') === 'true') {
    splash.style.display = 'none';
    return;
  }

  // Marcar que ya se mostró
  sessionStorage.setItem('splashShown', 'true');

  // Después de que termine de girar (5 segundos), mover al header
  setTimeout(() => {
    splash.classList.add('move-to-header');

    // Ocultar splash completamente después del movimiento
    setTimeout(() => {
      splash.classList.add('hidden');
    }, 1800);
  }, 5200);
}

window.onload = showSplash;
</script>
