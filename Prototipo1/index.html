      </button>

      <div class="carousel-dots" id="dots"></div>
    </div>

    <!-- Sección Últimas Publicaciones -->
    <section class="publicaciones-section">
      <div class="section-header">

        <div class="publicaciones-pagination" id="pagination"></div>
      </div>
      <div class="publicaciones-list" id="publicaciones-list"></div>

  </main>

<script>
  const SUPABASE_URL = 'https://lnqqmoflqbbgxstxlujy.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_ehNfp-wrQtIqlDbtNesRww_iFNWR-H3';

  const headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY
  };

  const track = document.getElementById('track');
  const dotsEl = document.getElementById('dots');
  const publicacionesList = document.getElementById('publicaciones-list');
  const paginationEl = document.getElementById('pagination');
  let actual = 0;
  let total = 1;
  let intervalo;
  let currentPage = 1;
  const PAGE_SIZE = 10;

  function getUruguayDate() {
    return new Date().toLocaleDateString('sv', { timeZone: 'America/Montevideo' });
  }

  function formatDate(value) {
    if (!value) return '';
    return new Date(value).toLocaleDateString('es-UY', {
      day: '2-digit',
      month: '2-digit',
      year: 'numeric',
      timeZone: 'America/Montevideo'
    });
  }

  function escapeHtml(text) {
    return text
      ? String(text)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;')
      : '';
  }

  function crearDot(i) {
    const d = document.createElement('button');
    d.className = 'carousel-dot' + (i === 0 ? ' active' : '');
    d.setAttribute('aria-label', 'Ir a slide ' + (i + 1));
    d.addEventListener('click', () => ir(i));
    dotsEl.appendChild(d);
  }

  function actualizar() {
    track.style.transform = 'translateX(-' + (actual * 100) + '%)';
    document.querySelectorAll('.carousel-dot').forEach((d, i) => {
      d.classList.toggle('active', i === actual);
    });
  }

  function mover(dir) {
    actual = (actual + dir + total) % total;
    actualizar();
  }

  function ir(idx) {
    actual = idx;
    actualizar();
  }

  function iniciarAutoplay() {
    clearInterval(intervalo);
    intervalo = setInterval(() => mover(1), 4000);
  }

  function crearSlideHtml(publicacion) {
    return `
      <div class="carousel-slide">
        <a class="slide-card" href="publicacion.html?id=${publicacion.id}">
          <img src="${publicacion.UrlFoto || 'Imagenes/logo_fondo.png'}" alt="${escapeHtml(publicacion.titulo || 'Publicación')}">
          <div class="slide-copy">
            <h3 class="slide-title">${escapeHtml(publicacion.titulo || 'Sin título')}</h3>
            <p class="slide-snippet">${escapeHtml(publicacion.descripcion || '').slice(0, 100)}...</p>
            <span class="slide-link">Leer publicación</span>
          </div>
        </a>
      </div>`;
  }

  function crearCardHtml(publicacion) {
    const descripcion = publicacion.descripcion || 'Sin descripción disponible.';
    const snippet = descripcion.length > 100 ? descripcion.slice(0, 100) : descripcion;
    const necesitaToggle = descripcion.length > 100;
    const id = publicacion.id;

    return `
      <article class="publicacion-card">
        <img src="${publicacion.UrlFoto || 'Imagenes/logo_fondo.png'}" alt="${escapeHtml(publicacion.titulo || 'Publicación')}">
        <div class="publicacion-card-body">
          <div class="publicacion-card-meta">${formatDate(publicacion.fecha)}${publicacion.IDfoto ? ' · ' + escapeHtml(publicacion.IDfoto) : ''}</div>
          <h3 class="publicacion-card-title">${escapeHtml(publicacion.titulo || 'Sin título')}</h3>
          <p class="publicacion-card-text">
            <span id="descripcion-preview-${id}">${escapeHtml(snippet)}</span>
            ${necesitaToggle ? `<span id="descripcion-full-${id}" class="descripcion-full" style="display:none;">${escapeHtml(descripcion.slice(100))}</span>` : ''}
            ${necesitaToggle ? `<button type="button" class="descripcion-toggle" onclick="toggleDescripcion('${id}')">Ver más</button>` : ''}
          </p>
          <a class="btn slide-link" href="publicacion.html?id=${id}">Ver publicación</a>
        </div>
      </article>`;
  }

  function renderPagination(page, totalPages) {
    paginationEl.innerHTML = '';
    if (totalPages <= 1) {
      return;
    }

    const prev = document.createElement('button');
    prev.textContent = 'Anterior';
    prev.className = 'pagination-button';
    prev.disabled = page === 1;
    prev.addEventListener('click', () => cargarPublicaciones(page - 1));
    paginationEl.appendChild(prev);

    for (let i = 1; i <= totalPages; i += 1) {
      const btn = document.createElement('button');
      btn.textContent = String(i);
      btn.className = 'pagination-button';
      btn.disabled = i === page;
      btn.addEventListener('click', () => cargarPublicaciones(i));
      paginationEl.appendChild(btn);
    }

    const next = document.createElement('button');
    next.textContent = 'Siguiente';
    next.className = 'pagination-button';
    next.disabled = page === totalPages;
    next.addEventListener('click', () => cargarPublicaciones(page + 1));
    paginationEl.appendChild(next);
  }

  function toggleDescripcion(id) {
    const preview = document.getElementById(`descripcion-preview-${id}`);
    const full = document.getElementById(`descripcion-full-${id}`);
    const button = preview?.parentElement.querySelector('.descripcion-toggle');
    if (!preview || !full || !button) return;

    const showing = full.style.display === 'inline';
    full.style.display = showing ? 'none' : 'inline';
    button.textContent = showing ? 'Ver más' : 'Ver menos';
  }

  async function cargarPublicaciones(page = 1) {
    currentPage = page;
    const offset = (page - 1) * PAGE_SIZE;
    const today = getUruguayDate();

    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/publicacion?select=*&fecha=lte.${today}&order=fecha.desc,id.desc&limit=${PAGE_SIZE}&offset=${offset}`,
        { headers: { ...headers, 'Prefer': 'count=exact' } }
      );
      const publicaciones = await res.json();
      const contentRange = res.headers.get('content-range');
      const totalItems = contentRange ? parseInt(contentRange.split('/')[1], 10) || publicaciones.length : publicaciones.length;
      const totalPages = Math.max(1, Math.ceil(totalItems / PAGE_SIZE));

      publicacionesList.innerHTML = publicaciones.length
        ? publicaciones.map(crearCardHtml).join('')
        : '<div class="publicaciones-vacias">No hay publicaciones para mostrar en este momento.</div>';

      renderPagination(page, totalPages);

      const carouselPublicaciones = publicaciones.slice(0, 5);
      track.innerHTML = carouselPublicaciones.length
        ? carouselPublicaciones.map(crearSlideHtml).join('')
        : '<div class="carousel-slide slide-1"><span class="slide-label">No hay publicaciones activas.</span></div>';

      total = carouselPublicaciones.length || 1;
      actual = 0;
      dotsEl.innerHTML = '';
      Array.from({ length: total }).forEach((_, i) => crearDot(i));
      actualizar();
      iniciarAutoplay();
    } catch (e) {
      console.error('Error cargando publicaciones:', e);
      publicacionesList.innerHTML = '<div class="publicaciones-vacias">Error al cargar publicaciones. Intenta de nuevo más tarde.</div>';
      track.innerHTML = '<div class="carousel-slide slide-1"><span class="slide-label">Error al cargar publicaciones.</span></div>';
      dotsEl.innerHTML = '';
      crearDot(0);
    }
  }

  // ── CARGAR NOTICIAS EN LA SIDEBAR DERECHA ──
  async function cargarNoticiasSidebar() {
    const contenedor = document.getElementById('noticias-contenedor');
    if (!contenedor) return; // Salvaguarda por si se usa en páginas sin sidebar

    try {
      const hoy = getUruguayDate();
      
      // Hacemos el fetch pidiendo solo los posts donde es_noticia sea true
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/publicacion?select=id,titulo,fecha,es_noticia&es_noticia=eq.true&fecha=lte.${hoy}&order=fecha.desc,id.desc&limit=5`,
        { headers }
      );
      
      if (!res.ok) {
        throw new Error('Error en la respuesta de Supabase');
      }

      const noticias = await res.json();

      // Si no hay ninguna noticia marcada
      if (!noticias || noticias.length === 0) {
        contenedor.innerHTML = '<div class="noticia-vacia">No hay noticias recientes.</div>';
        return;
      }

      // Renderizamos las noticias encontradas
      contenedor.innerHTML = noticias.map(n => {
        return `
          <article class="noticia-item">
            <span class="noticia-item-fecha">📅 ${formatDate(n.fecha)}</span>
            <a class="noticia-item-titulo" href="publicacion.html?id=${n.id}">
              ${escapeHtml(n.titulo)}
            </a>
          </article>
        `;
      }).join('');

    } catch (error) {
      console.error('Error cargando noticias:', error);
      // Evitamos romper la ejecución y mostramos un estado amigable
      contenedor.innerHTML = '<div class="noticia-vacia">No hay noticias disponibles.</div>';
    }
  }

  cargarPublicaciones();
  cargarNoticiasSidebar();
  // ==================== SPLASH SCREEN LOGIC ====================
  const splash = document.getElementById('splash');

  function showSplash() {
    if (sessionStorage.getItem('splashShown') === 'true') {
      splash.style.display = 'none';
      return;
    }

    sessionStorage.setItem('splashShown', 'true');
    setTimeout(() => {
      splash.classList.add('move-to-header');
      setTimeout(() => {
        splash.classList.add('hidden');
      }, 1800);
    }, 5200);
  }

  window.onload = showSplash;
</script>
