  <script>
    const SUPABASE_URL = 'https://lnqqmoflqbbgxstxlujy.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_ehNfp-wrQtIqlDbtNesRww_iFNWR-H3';

    const headers = {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY
    };

    function getUruguayDate() {
      return new Date().toLocaleDateString('sv', { timeZone: 'America/Montevideo' });
    }

    function formatDate(value) {
      if (!value) return '';
      return new Date(value).toLocaleDateString('es-UY', {
        day: '2-digit', month: '2-digit', year: 'numeric', timeZone: 'America/Montevideo'
      });
    }

    function escapeHtml(text) {
      return text
        ? text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\"/g, '&quot;').replace(/'/g, '&#039;')
        : '';
    }

    function getQueryParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    function showError(message) {
      document.getElementById('publicacion-content').style.display = 'none';
      const error = document.getElementById('publicacion-error');
      error.textContent = message;
      error.style.display = 'block';
    }

    async function cargarPublicacion() {
      const id = getQueryParam('id');
      if (!id) {
        showError('ID de publicación faltante.');
        return;
      }

      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/publicacion?select=*&id=eq.${id}&fecha=lte.${getUruguayDate()}`, { headers });
        const publicaciones = await res.json();
        if (!publicaciones.length) {
          showError('No se encontró la publicación o su fecha no es vigente.');
          return;
        }

        const publicacion = publicaciones[0];
        document.getElementById('publicacion-titulo').textContent = publicacion.titulo || 'Sin título';
        document.getElementById('publicacion-meta').textContent = `${formatDate(publicacion.fecha)} · ${publicacion.IDfoto || ''}`;
        const img = document.getElementById('publicacion-img');
        img.src = publicacion.url_foto || 'Imagenes/logo_fondo.png';
        img.alt = publicacion.titulo || 'Publicación';
        document.getElementById('publicacion-descripcion').textContent = publicacion.descripcion || 'Sin descripción disponible.';
      } catch (e) {
        console.error('Error cargando publicación:', e);
        showError('Error al cargar la publicación.');
      }
    }

    window.addEventListener('DOMContentLoaded', cargarPublicacion);
  </script>
